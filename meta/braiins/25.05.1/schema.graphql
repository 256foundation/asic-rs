union WifiSetEnabledResult = VoidResult | WifiSetEnabledError

type WifiStatusError {
  message: String!
}

union WifiStatusResult = BosWifiStatus | WifiStatusError

type WorkSolverInfo {
  name: String!
  nominalMhs: Float!
  realHashrate: RealHashrate!
  hwErrorMhs15M: Float!
  hwDetails: HwDetails

  # Optional details about the connected PSU
  psuInfo: PsuInfo
  power: PowerInfo
  tuner: TunerInfo
  temperatures: [Temperature!]
  childSolvers: [WorkSolverInfo!]
}
