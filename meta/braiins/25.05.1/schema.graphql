schema {
  query: Query
  mutation: Mutation
  subscription: SubscriptionRoot
}

# Indicates that an Input Object is a OneOf Input Object (and thus requires
#                         exactly one of its field be provided)
directive @oneOf on INPUT_OBJECT

type Appeal {
  id: ID!
  kind: AppealKind!
  timestamp: Timestamp!
  message: String!
}

enum AppealKind {
  INFO
  SUCCESS
  WARNING
  ERROR
}

type AppealRemoveError {
  message: String!
}

union AppealRemoveResult = VoidResult | AppealRemoveError

type AttributeError implements Error {
  message: String!
}

type Auth {
  login(username: String!, password: String!): AuthResult!
  logout: AuthResult!
  extend: AuthResult!
}

type AuthError implements Error {
  message: String!
}

union AuthResult = VoidResult | AuthError

type Autotuning {
  enabled: Boolean
  mode: TunerMode
  powerTarget: Int
  hashrateTarget: Float
}

type AutotuningError implements Error {
  message: String!
  mode: String
  powerTarget: String
  hashrateTarget: String
  performanceScaling: PerformanceScalingError
}

input AutotuningIn {
  mode: TunerMode
  powerTarget: Int
  hashrateTarget: Float
  performanceScaling: PerformanceScalingSetter
  hashChains: [HashChainAutotuningSetter!]
}

type AutotuningMetadata {
  enabled: BooleanMetadata!
  modes: [TunerMode!]!
  modeDefault: TunerMode!
  powerTarget: UsizeMetadata!
  hashrateTarget: FloatMetadata!
}

type AutotuningOut {
  hashChains: [HashChain!]!
  autotuning: Autotuning
  performanceScaling: PerformanceScaling
}

union AutotuningResult = AutotuningOut | AutotuningError | AttributeError

type BacklightError {
  message: String!
}

type BacklightOk {
  value: Boolean!
}

union BacklightResult = BacklightOk | BacklightError

type BooleanMetadata {
  default: Boolean!
}

type BosError implements Error {
  message: String!
}

type BosFaultLight {
  enabled: Boolean!
}

type BosInfo {
  mode: BosMode!
  version: BosVersion!
  controlBoardSocFamily: String!
  platform: String!
}

type BosManager {
  # BOS management ID
  managementId: String

  # timestamp of last obtained configuration
  lastModified: Timestamp
}

enum BosMode {
  SD
  NAND
  EMMC
}

type BosMutation {
  reboot: BosResult!
  system: BosSystemMutation!
  network: BosNetworkConfigMutation!
  wifi: BosWifiMutation
  setPassword(newPassword: String): BosResult!
  setHostname(hostname: String!): HostnameResult!
  autoUpgrade(value: Boolean!): BosResult!
  setFaultLight(enable: Boolean!): BosFaultLight!
  setTimezone(timezone: String!): BosResult!
  upgrade(hash: String!): BosResult!
  factoryReset: BosResult!
}

union BosNetworkConfig = Dhcp | StaticIp

type BosNetworkConfigMutation {
  setDhcp: DhcpResult!
  setStaticIp(
    address: String!
    netmask: String!
    gateway: String!
    dnsServers: [String!]!
  ): StaticIpResult!
}

type BosQuery {
  hostname: String
  macAddress: String
  uptime: BosUptime
  logTargets: [LogTarget!]!
  log(target: LogTarget!): [String!]!
  errors: [ErrorEntry!]!
  hwid: String
  serialNumber: String
  info: BosInfo!
  manager: BosManager
  autoUpgrade: Boolean
  network: BosNetworkConfig!
  wifi: BosWifiQuery
  faultLight: Boolean!
  timezone: TimezoneData!
  timezoneList: [TimezoneData!]!
  checkForUpgrade: CheckUpgradeResult
}

union BosResult = VoidResult | BosError

type BosSystemError {
  message: String!
}

type BosSystemMutation {
  callCommand(commandName: String!, args: [String!]!): BosSystemResult!
}

union BosSystemResult = CmdOk | BosSystemError

type BosUptime {
  # system up since Unix timestamp (epoch)
  since: Timestamp!

  # how long the system has been running in seconds
  durationS: Int!
}

type BosVersion {
  full: String!
  isPlus: Boolean!
}

type BosWifiMutation {
  connect(
    ssid: String!
    password: String
    encryption: EncryptionType!
  ): WifiConnectResult!
  setEnabled(enable: Boolean!): WifiSetEnabledResult!
}

type BosWifiQuery {
  status: WifiStatusResult!
  scan: WifiScanResult!
}

type BosWifiStatus {
  enabled: Boolean!
  mode: WifiMode!
  cell: WifiCell
}

type BosminerConfig {
  hashChainGlobal: HashChainGlobal
  tempControl: TempControl
  fanControl: FanControl
  modelDetection: ModelDetection
  autotuning: Autotuning
  performanceScaling: PerformanceScaling
  management: Management
  groups: [GroupConfig!]!
  hashChains: [HashChain!]!
}

type BosminerConfigError implements Error {
  message: String!
}

union BosminerConfigResult = BosminerConfig | BosminerConfigError

type BosminerConfigurator {
  addGroupWithQuota(name: String!, quota: Int): GroupResult!
  addGroupWithFixedShareRatio(name: String!, ratio: Float!): GroupResult!
  removeGroup(id: ID!): GroupListResult!
  updateGroups(groups: [Group!]!): GroupListResult!
  group(id: ID!): GroupConfiguratorResult!
  updateTempAndFans(input: TempAndFansIn!, apply: Boolean!): TempAndFansResult!
  updatePerformance(input: PerformanceIn!, apply: Boolean!): PerformanceResult!
  updateAutotuning(input: AutotuningIn!, apply: Boolean!): AutotuningResult!
}

type BosminerError {
  message: String!
}

type BosminerInfo {
  modelName: String!
  poolGroups: [GroupInfo!]!
  summary: SummaryInfo!
  workSolver: WorkSolverInfo!
  fans: [FanInfo!]
  tempCtrl: TempCtrlInfo
}

type BosminerInfoSample {
  timestamp: Timestamp!
  poolGroups: [GroupInfo!]
  summary: SummaryInfo
  workSolver: WorkSolverInfo
  fans: [FanInfo!]
  tempCtrl: TempCtrlInfo
}

union BosminerInfoSubscriptionResult =
    BosminerInfoSample
  | BosminerInfoUnavailable

type BosminerInfoUnavailable {
  message: String!
}

union BosminerLicenseSubscriptionResult = LicenseOk | LicenseError

type BosminerMetadata {
  pool: PoolMetadata!
  group: GroupMetadata!
  hashChain: HashChainMetadata
  tempControl: TempControlMetadata
  fanControl: FanControlMetadata
  autotuning: AutotuningMetadata
  performanceScaling: PerformanceScalingMetadata
  display: DisplayMetadata
  upgradeDurationSec: Int
  wifi: WifiMetadata
}

type BosminerMutation {
  config: BosminerConfigurator!
  start: BosminerResult!
  stop: BosminerResult!
  restart: BosminerResult!
}

type BosminerQuery {
  info: BosminerInfo!
  uptime: BosminerUptime
  metadata: BosminerMetadata!
  config: BosminerConfigResult!
  defaultDevfeeRatio: Float!
}

union BosminerResult = VoidResult | BosminerError

type BosminerUptime {
  # BOSminer up since Unix timestamp (epoch)
  # NOTE: this has been added to be consistent with BOS uptime but it should be used
  # with cautious because it can return incorrect timestamp when a system time is not
  # correctly synchronized (it can be also used for detection of this condition)
  since: Timestamp!

  # how long the BOSminer has been running in seconds
  durationS: Int!
}

union CheckUpgradeResult = UpgradeDetail | BosError

type CmdOk {
  message: String!
}

type Component {
  name: String!
  index: Int!
}

enum DashboardDensity {
  DEFAULT
  COMPACT
}

type Dhcp {
  void: Void!
}

type DhcpError {
  message: String!
}

